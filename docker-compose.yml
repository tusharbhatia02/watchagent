services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data
    env_file:
      - .env
    environment:
      # DB_PATH is fixed to the mounted volume so data persists across restarts,
      # regardless of what .env says. Other vars (POLL_INTERVAL_MINUTES,
      # LOG_LEVEL) come from .env via env_file above.
      - DB_PATH=/data/watchagent.db
    restart: unless-stopped

volumes:
  db_data:
